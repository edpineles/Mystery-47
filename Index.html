<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mystery 47" />
  <link rel="manifest" href="/manifest.json" />
  <title>Mystery 47</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1923; --surface: #1a2535; --border: #2a3a50;
      --accent: #f5a623; --accent2: #4fc3f7;
      --text: #e8edf2; --muted: #7a8fa6;
      --danger: #ef5350; --ok: #66bb6a; --radius: 14px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; padding: env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,16px);
      max-width: 480px; margin: 0 auto; }
    .header { padding: 20px 0 16px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    .route-badge { background: var(--accent); color: #000; font-weight: 800; font-size: 13px;
      padding: 3px 9px; border-radius: 6px; }
    .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 8px 14px; font-size: 14px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 6px; }
    .refresh-btn:active { opacity: 0.6; } .refresh-btn:disabled { opacity: 0.4; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center;
      justify-content: space-between; font-size: 13px; color: var(--muted); }
    .status-left { display: flex; align-items: center; gap: 7px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: var(--ok); } .dot-warn { background: var(--accent); } .dot-error { background: var(--danger); }
    .countdown { color: var(--accent2); font-variant-numeric: tabular-nums; }
    .section-heading { font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .bus-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
    .bus-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .bus-card.close::before { background: var(--ok); }
    .bus-card.medium::before { background: var(--accent); }
    .bus-card.far::before { background: var(--muted); }
    .bus-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .bus-destination { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .bus-distance { font-size: 22px; font-weight: 700; color: var(--accent);
      line-height: 1; text-align: right; flex-shrink: 0; margin-left: 12px; }
    .bus-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .pill { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; font-size: 12px; color: var(--muted); }
    .pill.hi { color: var(--accent2); border-color: rgba(79,195,247,0.3); }
    .bus-stale { font-size: 11px; color: var(--danger); margin-top: 6px; }
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty .emo { font-size: 48px; margin-bottom: 12px; }
    .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; line-height: 1.5; }
    .error-box { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3);
      border-radius: var(--radius); padding: 16px; font-size: 14px; color: var(--danger); line-height: 1.5; }
    .permission-prompt { text-align: center; padding: 60px 24px; }
    .permission-prompt .emo { font-size: 56px; margin-bottom: 16px; }
    .permission-prompt h2 { font-size: 20px; margin-bottom: 8px; }
    .permission-prompt p { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .primary-btn { background: var(--accent); color: #000; border: none; border-radius: 12px;
      padding: 14px 28px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
    .primary-btn:active { opacity: 0.7; }
    .footer { text-align: center; padding: 20px 0 8px; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const EDGE_URL = 'https://loqlyispbtlqrpqpffhl.supabase.co/functions/v1/bus-47-tracker'
const REFRESH  = 30

const { useState, useEffect, useCallback, useRef } = React
const e = React.createElement

function compassArrow(c) {
  return { N:'↑',NE:'↗',E:'→',SE:'↘',S:'↓',SW:'↙',W:'←',NW:'↖' }[c] || '•'
}
function distClass(km) {
  return km < 0.5 ? 'close' : km < 2 ? 'medium' : 'far'
}
function fmtAge(s) {
  if (s === null) return null
  return s < 60 ? `${s}s ago` : `${Math.round(s/60)}m ago`
}

function App() {
  const [phase, setPhase]         = useState('idle')   // idle | requesting | ready | denied
  const [coords, setCoords]       = useState(null)
  const [buses, setBuses]         = useState([])
  const [loading, setLoading]     = useState(false)
  const [error, setError]         = useState(null)
  const [updated, setUpdated]     = useState(null)
  const [countdown, setCountdown] = useState(REFRESH)
  const timerRef    = useRef(null)
  const cdRef       = useRef(null)

  const fetchBuses = useCallback(async (c) => {
    if (!c) return
    setLoading(true); setError(null)
    try {
      const res  = await fetch(`${EDGE_URL}?lat=${c.latitude}&lon=${c.longitude}`)
      const data = await res.json()
      if (!data.ok) throw new Error(data.error || 'Server error')
      setBuses(data.buses || [])
      setUpdated(new Date())
    } catch(err) {
      setError(err.message)
    } finally {
      setLoading(false); setCountdown(REFRESH)
    }
  }, [])

  const startTimers = useCallback((c) => {
    clearInterval(timerRef.current); clearInterval(cdRef.current)
    timerRef.current = setInterval(() => {
      navigator.geolocation.getCurrentPosition(
        p => { setCoords(p.coords); fetchBuses(p.coords) },
        ()  => fetchBuses(c)
      )
    }, REFRESH * 1000)
    cdRef.current = setInterval(() => setCountdown(n => Math.max(0, n-1)), 1000)
  }, [fetchBuses])

  const requestLocation = useCallback(() => {
    setPhase('requesting')
    navigator.geolocation.getCurrentPosition(
      p => { setPhase('ready'); setCoords(p.coords); fetchBuses(p.coords); startTimers(p.coords) },
      () => { setPhase('denied'); setError('Location access denied. Enable in Settings → Safari → Location.') },
      { enableHighAccuracy: true, timeout: 10000 }
    )
  }, [fetchBuses, startTimers])

  useEffect(() => () => { clearInterval(timerRef.current); clearInterval(cdRef.current) }, [])

  // ── Permission screen ───────────────────────────────────────────────────────
  if (phase === 'idle' || phase === 'requesting') {
    return e('div', { id:'root' },
      e('div', { className:'header' },
        e('h1', null, 'Mystery ', e('span',null,'47')),
        e('span', { className:'route-badge' }, 'B&H')
      ),
      e('div', { className:'permission-prompt' },
        e('div', { className:'emo' }, '🚌'),
        e('h2', null, 'Find the Mystery 47'),
        e('p', null, 'Allow location access to see which buses are nearby and how close they actually are.'),
        e('button', { className:'primary-btn', onClick: requestLocation, disabled: phase==='requesting' },
          phase === 'requesting' ? 'Getting location…' : 'Share my location'
        )
      )
    )
  }

  // ── Main screen ─────────────────────────────────────────────────────────────
  const dotClass   = error ? 'dot-error' : loading ? 'dot-warn' : 'dot-ok'
  const statusText = error   ? 'Error'
    : loading  ? 'Fetching…'
    : updated  ? `Updated ${updated.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`
    : 'Ready'

  return e('div', { id:'root' },

    e('div', { className:'header' },
      e('h1', null, 'Mystery ', e('span',null,'47')),
      e('button', { className:'refresh-btn', onClick:()=>fetchBuses(coords), disabled:loading },
        e('span', { className: loading?'spin':'' }, '↻'),
        loading ? 'Loading' : 'Refresh'
      )
    ),

    e('div', { className:'status-bar' },
      e('div', { className:'status-left' },
        e('span', { className:`dot ${dotClass}` }),
        statusText
      ),
      !error && e('span', { className:'countdown' }, `${countdown}s`)
    ),

    error && e('div', { className:'error-box' }, '⚠️ ', error),

    !error && phase === 'ready' && (
      buses.length === 0 && !loading
        ? e('div', { className:'empty' },
            e('div', { className:'emo' }, '🔍'),
            e('h2', null, 'No 47s found'),
            e('p', null, "Either they're all hiding, or none are currently active in the Brighton area.")
          )
        : e('div', null,
            e('div', { className:'section-heading' }, `${buses.length} bus${buses.length!==1?'es':''} on route`),
            ...buses.map((bus, i) =>
              e('div', { key: bus.vehicleRef||i, className:`bus-card ${distClass(bus.distanceKm)}` },
                e('div', { className:'bus-top' },
                  e('div', null,
                    e('div', { className:'bus-destination' }, `→ ${bus.destination}`)
                  ),
                  e('div', { className:'bus-distance' }, bus.distanceFormatted)
                ),
                e('div', { className:'bus-meta' },
                  e('span', { className:'pill hi' }, `${compassArrow(bus.compass)} ${bus.compass}`),
                  bus.directionRef && e('span', { className:'pill' }, bus.directionRef),
                  bus.origin && e('span', { className:'pill' }, `From: ${bus.origin}`)
                ),
                bus.ageSeconds > 60 && e('div', { className:'bus-stale' },
                  `⚠ Position ${fmtAge(bus.ageSeconds)} — may be inaccurate`
                )
              )
            )
          )
    ),

    e('div', { className:'footer' }, 'Live data via BODS · Brighton & Hove route 47')
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App))
</script>
</body>
</html>
